<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Verve</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div style="position: absolute; top: 1.5rem; right: 1.5rem; display: flex; gap: 1rem; z-index: 100;">
        <button class="toggle-btn" id="dir-toggle" title="Toggle RTL/LTR" style="background: var(--bg-secondary);">LTR</button>
        <button class="toggle-btn" id="theme-toggle" title="Toggle Dark/Light Mode" style="background: var(--bg-secondary);">
            <i class="fa-solid fa-moon"></i>
        </button>
    </div>
    <div style="display: flex; min-height: 100vh; background: var(--bg-primary);">
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem;">
            <div style="width: 100%; max-width: 400px; background: var(--bg-secondary); padding: 3rem; border-radius: var(--border-radius); box-shadow: var(--shadow-lg); border: 1px solid var(--border-color);">
                <div class="text-center" style="margin-bottom: 2rem;">
                    <a href="index.html" class="logo" style="justify-content: center;">
                        <i class="fa-solid fa-earth-americas"></i>
                        Verve<span>.</span>
                    </a>
                    <h2 style="margin-top: 1rem;">Welcome Back</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Please enter your details to sign in.</p>
                </div>

                <form>
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem;">Email Address</label>
                        <input type="email" placeholder="Enter your email" style="width: 100%; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-main); outline: none;" required>
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem;">Password</label>
                        <input type="password" placeholder="Enter your password" style="width: 100%; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-main); outline: none;" required>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.9rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" style="color: var(--primary-color); font-weight: 500;">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
                </form>

                <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
                    Don't have an account? <a href="sign-up.html" style="color: var(--primary-color); font-weight: 600;">Sign Up</a>
                </p>
            </div>
        </div>
        <div class="auth-bg" style="flex: 1; background: url('https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80') center/cover no-repeat;">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
